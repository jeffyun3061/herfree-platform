spring:
  application:
    name: herfree-api
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-expiration-seconds: ${JWT_ACCESS_EXPIRATION:3600}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.herfree: DEBUG

# CORS — 로컬은 패턴(모바일/LAN/ngrok), 운영은 Vercel URL을 환경변수로 주입한다
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    nickname: ${ADMIN_NICKNAME:HerfreeOps}
    sync-existing: ${ADMIN_BOOTSTRAP_SYNC_EXISTING:false}
  s3:
    bucket: ${S3_BUCKET:${AWS_S3_BUCKET:}}
    region: ${S3_REGION:${AWS_REGION:ap-northeast-2}}
    access-key: ${S3_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
    secret-key: ${S3_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
    public-base-url: ${S3_PUBLIC_BASE_URL:}
  # 운영(prod)에서는 반드시 false — local 전용 데모 시드 (DemoDataSeedRunner)
  demo-seed:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: local

app:
  cors:
    allowed-origin-patterns: >-
      http://localhost:*,
      http://127.0.0.1:*,
      http://192.168.*.*:*,
      http://10.*.*.*:*,
      https://*.ngrok-free.dev,
      https://*.ngrok-free.app,
      https://*.ngrok.io

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  demo-seed:
    enabled: false
  bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
