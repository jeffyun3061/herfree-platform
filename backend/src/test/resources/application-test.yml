spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:herfree_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration-seconds: 3600
